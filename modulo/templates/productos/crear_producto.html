{% extends 'layouts/base.html' %}

{% block title %}
Crear Producto
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-8">

        <div class="card shadow">

            <div class="card-header bg-success text-white">

                <h3>Registrar Producto</h3>

            </div>

            <div class="card-body">

                <form method="POST">

                    {% csrf_token %}

                    {{ formulario.as_p }}

                    <button type="submit"
                            class="btn btn-success">

                        Guardar Producto

                    </button>

                    <a href="/productos/"
                       class="btn btn-secondary">

                        Cancelar

                    </a>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
